name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Ставим именно ту версию, которую он требует по зарез
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '9.3.1'

    # Создаем дебаг-ключ
    - name: Create debug keystore
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    # Собираем на Gradle 9.3.1, но ЖЕСТКО душим потоки, чтобы KSP не падал в ошибку
    - name: Build with Gradle
      run: gradle assembleDebug --no-daemon --no-configuration-cache --no-build-cache -Dorg.gradle.parallel=false
      env:
        GRADLE_OPTS: "-Djava.awt.headless=true"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SmartStoreBuild1.0
        path: app/build/outputs/apk/debug/app-debug.apk
        
